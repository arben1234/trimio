<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><rect width="300" height="400" fill="#111"/>

  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1a0a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#111" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottle1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a3a2a"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
    <linearGradient id="bottle2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="bottle3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0a1a2a"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="#111"/>
  <rect width="300" height="400" fill="url(#bg5)"/>
  <!-- Mensola -->
  <rect x="10" y="200" width="280" height="12" rx="2" fill="#2a1e12" stroke="#3a2a18" stroke-width="1"/>
  <!-- Ombra mensola -->
  <rect x="15" y="212" width="276" height="6" rx="1" fill="#000" opacity="0.4"/>
  <!-- Bottiglia 1 alta (pompa) -->
  <rect x="30" y="90" width="38" height="110" rx="8" fill="url(#bottle1)" stroke="#3a4a3a" stroke-width="1"/>
  <rect x="36" y="80" width="12" height="14" rx="3" fill="#3a4a3a"/>
  <rect x="40" y="68" width="4" height="16" rx="2" fill="#4a5a4a"/>
  <rect x="36" y="68" width="12" height="6" rx="2" fill="#4a6a4a"/>
  <!-- Etichetta bottiglia 1 -->
  <rect x="34" y="110" width="30" height="48" rx="3" fill="#e8e0d0" opacity="0.9"/>
  <text x="49" y="127" text-anchor="middle" fill="#1a1a1a" font-family="system-ui" font-size="6" font-weight="700">BARBERS</text>
  <text x="49" y="137" text-anchor="middle" fill="#4a6a4a" font-family="system-ui" font-size="5">SHAMPOO</text>
  <line x1="36" y1="142" x2="62" y2="142" stroke="#ccc" stroke-width="0.5"/>
  <text x="49" y="152" text-anchor="middle" fill="#888" font-family="system-ui" font-size="4.5">250 ml</text>
  <!-- Riflesso luce bottiglia 1 -->
  <rect x="32" y="95" width="5" height="80" rx="2" fill="white" opacity="0.1"/>
  <!-- Bottiglia 2 media -->
  <rect x="80" y="118" width="44" height="82" rx="6" fill="url(#bottle2)" stroke="#4a3a2a" stroke-width="1"/>
  <rect x="88" y="110" width="18" height="12" rx="3" fill="#4a3020"/>
  <ellipse cx="97" cy="108" rx="10" ry="5" fill="#5a4030"/>
  <!-- Etichetta bottiglia 2 -->
  <rect x="84" y="130" width="36" height="44" rx="3" fill="#1a1a1a" opacity="0.9" stroke="#c8a040" stroke-width="1"/>
  <text x="102" y="145" text-anchor="middle" fill="#c8a040" font-family="system-ui" font-size="6" font-weight="700">GOLD</text>
  <text x="102" y="155" text-anchor="middle" fill="#c8a040" font-family="system-ui" font-size="5">POMADE</text>
  <line x1="87" y1="160" x2="117" y2="160" stroke="#c8a040" stroke-width="0.5"/>
  <text x="102" y="168" text-anchor="middle" fill="#888" font-family="system-ui" font-size="4.5">STRONG HOLD</text>
  <rect x="82" y="123" width="5" height="60" rx="2" fill="white" opacity="0.08"/>
  <!-- Barattolo crema -->
  <ellipse cx="175" cy="170" rx="30" ry="12" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="145" y="148" width="60" height="24" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <ellipse cx="175" cy="148" rx="30" ry="12" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Etichetta barattolo -->
  <ellipse cx="175" cy="148" rx="22" ry="8" fill="#e8e0d0"/>
  <text x="175" y="146" text-anchor="middle" fill="#1a1a1a" font-family="system-ui" font-size="5.5" font-weight="700">BEARD</text>
  <text x="175" y="153" text-anchor="middle" fill="#666" font-family="system-ui" font-size="4.5">BALM</text>
  <!-- Pennello da barba -->
  <rect x="226" y="148" width="12" height="52" rx="4" fill="#3a2a1a"/>
  <ellipse cx="232" cy="148" rx="12" ry="18" fill="#e8e0d0"/>
  <ellipse cx="232" cy="140" rx="9" ry="14" fill="#d4caba"/>
  <ellipse cx="232" cy="132" rx="7" ry="10" fill="#c8c0b0"/>
  <!-- Asciugamano arrotolato -->
  <ellipse cx="260" cy="186" rx="18" ry="14" fill="#2a2a2a"/>
  <ellipse cx="260" cy="186" rx="15" ry="11" fill="#e8e4dc"/>
  <ellipse cx="260" cy="186" rx="11" ry="8" fill="#2a2a2a"/>
  <ellipse cx="260" cy="186" rx="8" ry="5" fill="#dedad0"/>
  <!-- Forbici decorative -->
  <g transform="rotate(35, 255, 120)">
    <line x1="248" y1="100" x2="262" y2="140" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="262" y1="100" x2="248" y2="140" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="255" cy="120" r="4" fill="#777" stroke="#555" stroke-width="1"/>
  </g>
  <!-- Luce riflessa mensola -->
  <rect x="10" y="196" width="280" height="3" rx="1" fill="white" opacity="0.06"/>
  <defs>
    <linearGradient id="grad_label5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect x="0" y="350" width="300" height="50" fill="url(#grad_label5)"/>
  <text x="15" y="388" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1">PRODOTTI PREMIUM</text>
</svg>