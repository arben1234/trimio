<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><rect width="300" height="400" fill="#1a1a1a"/>

  <defs>
    <radialGradient id="light1" cx="60%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#d4a96a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skin1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c9956a"/>
      <stop offset="100%" stop-color="#8b5e3c"/>
    </radialGradient>
    <radialGradient id="skin2" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#e8b98a"/>
      <stop offset="100%" stop-color="#c4844a"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Sfondo luce -->
  <rect width="300" height="400" fill="url(#light1)"/>
  <!-- Specchio rettangolare -->
  <rect x="60" y="40" width="180" height="220" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <rect x="64" y="44" width="172" height="212" rx="3" fill="#1e1e1e"/>
  <!-- Riflessione soffusa nello specchio -->
  <ellipse cx="150" cy="150" rx="55" ry="70" fill="#c4844a" opacity="0.08" filter="url(#blur1)"/>
  <!-- Cliente seduto (sagoma) -->
  <ellipse cx="152" cy="195" rx="28" ry="32" fill="url(#skin1)"/>
  <path d="M124 195 Q130 170 152 165 Q174 170 180 195 Q176 230 152 232 Q128 230 124 195Z" fill="#8b5e3c"/>
  <!-- Capelli cliente -->
  <ellipse cx="152" cy="176" rx="22" ry="14" fill="#2a1a0a"/>
  <path d="M130 182 Q140 168 152 165 Q164 168 174 182" fill="#1a0f05"/>
  <!-- Mantello da barbiere -->
  <path d="M108 230 Q130 220 152 218 Q174 220 196 230 L210 380 L90 380 Z" fill="#1a1a2e"/>
  <path d="M108 230 Q152 238 196 230" fill="none" stroke="#444" stroke-width="1"/>
  <!-- Barbiere (più alto, in piedi dietro) -->
  <!-- Testa barbiere -->
  <ellipse cx="152" cy="92" rx="20" ry="23" fill="url(#skin2)"/>
  <!-- Capelli barbiere -->
  <ellipse cx="152" cy="77" rx="20" ry="12" fill="#1a0f05"/>
  <!-- Corpo barbiere -->
  <rect x="130" y="114" width="44" height="80" rx="8" fill="#2d2d2d"/>
  <!-- Grembiule barbiere -->
  <rect x="135" y="118" width="34" height="72" rx="4" fill="#1a1a1a"/>
  <!-- Braccio con forbici -->
  <path d="M174 130 Q195 118 210 108" stroke="#c4844a" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Forbici -->
  <path d="M206 104 L218 96 M206 112 L218 104" stroke="#aaa" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="209" cy="108" r="3" fill="#888"/>
  <!-- Braccio sinistro -->
  <path d="M130 135 Q112 148 105 158" stroke="#c4844a" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Pettine -->
  <rect x="96" y="155" width="18" height="6" rx="1" fill="#ccc"/>
  <line x1="99" y1="161" x2="99" y2="166" stroke="#ccc" stroke-width="1.5"/>
  <line x1="103" y1="161" x2="103" y2="166" stroke="#ccc" stroke-width="1.5"/>
  <line x1="107" y1="161" x2="107" y2="166" stroke="#ccc" stroke-width="1.5"/>
  <line x1="111" y1="161" x2="111" y2="166" stroke="#ccc" stroke-width="1.5"/>
  <!-- Sedia barbiere (base) -->
  <rect x="118" y="300" width="68" height="12" rx="4" fill="#333"/>
  <rect x="136" y="312" width="10" height="60" rx="3" fill="#2a2a2a"/>
  <rect x="158" y="312" width="10" height="60" rx="3" fill="#2a2a2a"/>
  <rect x="120" y="368" width="64" height="8" rx="4" fill="#222"/>
  <!-- Label overlay -->
  <rect x="0" y="350" width="300" height="50" fill="url(#grad_label1)"/>
  <defs>
    <linearGradient id="grad_label1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <text x="15" y="388" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1">TAGLIO PRECISO</text>
</svg>