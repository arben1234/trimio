<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#e5c158" />
      <stop offset="100%" stop-color="#a16207" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)" />
  
  <!-- Outer Gold Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#goldGrad)" stroke-width="16" />
  
  <!-- Bold Scissor Design -->
  <g transform="translate(256, 220) scale(1.3)">
    <!-- Scissor Left Handle -->
    <circle cx="-32" cy="80" r="28" fill="none" stroke="url(#goldGrad)" stroke-width="16" />
    <!-- Scissor Right Handle -->
    <circle cx="32" cy="80" r="28" fill="none" stroke="url(#goldGrad)" stroke-width="16" />
    <!-- Scissor Blades (Thick and Bold) -->
    <path d="M -16,60 L 0,0 L 0,-90 M 16,60 L 0,0" fill="none" stroke="url(#goldGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Center Screw -->
    <circle cx="0" cy="30" r="12" fill="url(#goldGrad)" />
  </g>
  
  <!-- Logo text -->
  <text x="256" y="445" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="56" font-weight="900" fill="url(#goldGrad)" letter-spacing="6">TRIMIO</text>
</svg>
